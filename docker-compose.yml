version: "3.9"

services:
  db:
    image: postgres:15
    container_name: oficina-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oficina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: oficina-api
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/oficina
      JWT_SECRET: supersecret
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

volumes:
  postgres_data: